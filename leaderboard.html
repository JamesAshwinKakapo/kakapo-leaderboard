<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kakapo Business Sales · Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:  #5CBC37;
    --green2: #CFF169;
    --blue:   #00D4FF;
    --blue2:  #0099CC;
    --gold:   #F5C518;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --bg:     #060608;
    --card:   #0C0E14;
    --card2:  #12151E;
    --text:   #ffffff;
    --muted:  #4A5A7A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-tl {
    position: fixed; top: -150px; left: -150px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(92,188,55,0.09) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .glow-br {
    position: fixed; bottom: -150px; right: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }

  /* ── SCENE (flip container) ── */
  .scene {
    position: fixed; inset: 0;
    z-index: 1;
    perspective: 1400px;
  }

  .flipper {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
  }
  .flipper.flipping { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    padding: 14px 28px 0;
  }
  .face.back {
    transform: rotateY(180deg);
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(0,212,255,0.12);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }

  .logo-box {
    background: rgba(92,188,55,0.1);
    border: 1px solid rgba(92,188,55,0.3);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--green);
    letter-spacing: 3px;
    white-space: nowrap;
  }
  /* If logo image present, show it instead */
  .logo-img {
    height: 40px;
    width: auto;
    object-fit: contain;
    filter: brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(75deg) brightness(1.15);
  }

  .title-group {}
  .view-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 1px;
  }
  .main-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(26px, 3vw, 42px);
    letter-spacing: 4px;
    line-height: 1;
  }
  .main-title span { color: var(--green); }

  .header-center {}
  .period-badge {
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(92,188,55,0.1));
    border: 1px solid rgba(0,212,255,0.25);
    border-radius: 6px;
    padding: 6px 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--blue);
    white-space: nowrap;
  }
  .period-badge span { color: var(--green2); }

  .header-right { text-align: right; }
  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--green);
    margin-bottom: 2px;
  }
  .live-dot::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .date { font-size: 12px; color: var(--muted); letter-spacing: 1px; }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tab {
    font-size: 11px;
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .tab.active { border-color: var(--blue); color: var(--blue); background: rgba(0,212,255,0.06); }
  .tab:hover  { color: #fff; border-color: rgba(255,255,255,0.25); }

  /* ── PODIUM TOP 3 ── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1.12fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .podium-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 12px 12px;
    position: relative;
    overflow: hidden;
  }
  .podium-card.p1 {
    border-color: rgba(245,197,24,0.9);
    background: linear-gradient(160deg, #5C4500, #3D2E00, #261D00);
    box-shadow: 0 0 50px rgba(245,197,24,0.35), inset 0 0 60px rgba(245,197,24,0.12);
  }
  .podium-card.p2 {
    border-color: rgba(192,192,192,0.9);
    background: linear-gradient(160deg, #5C5C5C, #3D3D3D, #262626);
    box-shadow: 0 0 50px rgba(192,192,192,0.35), inset 0 0 60px rgba(192,192,192,0.12);
  }
  .podium-card.p3 {
    border-color: rgba(205,127,50,0.9);
    background: linear-gradient(160deg, #5C3200, #3D2200, #261600);
    box-shadow: 0 0 50px rgba(205,127,50,0.35), inset 0 0 60px rgba(205,127,50,0.12);
  }
  .podium-card.p1::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 30%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(245,197,24,0.07), transparent);
    animation: shine 3.5s ease-in-out infinite;
  }
  @keyframes shine { 0%{left:-60%} 60%,100%{left:140%} }

  .rank-crown {
    position: absolute;
    top: 10px; left: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
  }
  .p1 .rank-crown { color: var(--gold); }
  .p2 .rank-crown { color: var(--silver); }
  .p3 .rank-crown { color: var(--bronze); }

  .medal-icon { position: absolute; top: 8px; right: 12px; font-size: 22px; }

  .avatar-ring {
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    background: var(--card2);
    flex-shrink: 0;
    overflow: hidden;
  }
  .p1 .avatar-ring { border-color: var(--gold);   box-shadow: 0 0 24px rgba(245,197,24,0.35), 0 0 50px rgba(245,197,24,0.1); }
  .p2 .avatar-ring { border-color: var(--silver);  box-shadow: 0 0 16px rgba(192,192,192,0.2); }
  .p3 .avatar-ring { border-color: var(--bronze);  box-shadow: 0 0 16px rgba(205,127,50,0.2); }

  .avatar-ring img   { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-initials   { font-family: 'Bebas Neue', sans-serif; font-size: 64px; color: var(--muted); }
  .p1 .avatar-initials { color: var(--gold); }
  .p2 .avatar-initials { color: var(--silver); }
  .p3 .avatar-initials { color: var(--bronze); }

  .podium-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1;
    margin-bottom: 5px;
  }
  .podium-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    text-align: center;
    color: var(--green2);
  }
  .p1 .podium-value { color: var(--gold); font-size: 32px; }
  .p2 .podium-value { color: var(--silver); }
  .p3 .podium-value { color: var(--bronze); }

  .podium-bar {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }
  .podium-bar-fill { height: 100%; border-radius: 3px; transition: width 1.5s ease; }
  .p1 .podium-bar-fill { background: var(--gold); }
  .p2 .podium-bar-fill { background: var(--silver); }
  .p3 .podium-bar-fill { background: var(--bronze); }

  /* ── REST GRID ── */
  .rest-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    flex: 1;
    overflow: hidden;
  }

  .rest-card {
    background: var(--card);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }
  .rest-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--blue), var(--green));
    border-radius: 10px 0 0 10px;
    opacity: 0.4;
  }

  .rest-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--muted);
    min-width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .rest-avatar {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(0,212,255,0.2);
    background: var(--card2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--blue);
    flex-shrink: 0;
    overflow: hidden;
  }
  .rest-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .rest-info { flex: 1; min-width: 0; }
  .rest-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
  }
  .rest-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--blue);
    line-height: 1;
    margin-top: 2px;
  }
  .rest-bar {
    margin-top: 4px; height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .rest-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue2), var(--blue));
    border-radius: 3px;
    transition: width 1.5s ease;
  }

  /* ── TICKER ── */
  .ticker-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 28px;
    background: linear-gradient(90deg, var(--green), var(--blue2));
    display: flex; align-items: center;
    overflow: hidden; z-index: 10;
  }
  .ticker-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px; letter-spacing: 3px;
    padding: 0 16px;
    background: rgba(0,0,0,0.3);
    height: 100%; display: flex; align-items: center;
    white-space: nowrap; color: #fff; flex-shrink: 0;
  }
  .ticker-track {
    display: flex;
    animation: ticker 45s linear infinite;
    gap: 50px; white-space: nowrap; padding-left: 30px;
  }
  .ticker-track span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; letter-spacing: 1px; font-weight: 600; color: #fff;
  }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ── STATUS ── */
  #fetch-status {
    position: fixed; top: 10px; right: 16px;
    z-index: 999; font-size: 11px; letter-spacing: 1px;
    background: rgba(0,0,0,0.7); color: var(--green2);
    padding: 4px 12px; border-radius: 4px;
    transition: opacity 0.5s; pointer-events: none;
  }
</style>
</head>
<body>

<div class="glow-tl"></div>
<div class="glow-br"></div>
<div id="fetch-status"></div>

<div class="ticker-wrap">
  <div class="ticker-label">⚡ LIVE STANDINGS</div>
  <div class="ticker-track" id="ticker"></div>
</div>

<div class="scene">
  <div class="flipper" id="flipper">
    <div class="face front" id="face-front"></div>
    <div class="face back"  id="face-back"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxA-9_lXG5pode6MACOIJo_tIdQ3nzQsUC0wAFoLEI8rtiJ5O4I5R0PT2nP3x_QUjP8/exec";

const CONFIG = {
  financialYearLabel: "FY 2025–26",
  quarterLabel:       "Q4 2026",
  brokers: []
};

const PHOTO_MAP = {
  "mike ponsonby":   "mike.png",
  "sterling arnet":  "sterling.png",
  "shelley may":     "shelley.png",
  "jess simmiss":    "jess.png",
  "jono kennedy":    "jono.png",
  "chloe mcknight":  "chloe.png",
  "henry helsby":    "henry.png",
  "brad proctor":    "brad.png",
  "viran ranchhod":  "viran.png",
  "matt cantlon":    "matt.png",
  "finn marchant":   "finn.png",
  "mandy ponsonby":  "mandy.png",
};

const FRAMES = [
  { badge: '🏠 QUARTER · LISTINGS', title: 'Listing Superstar of the Quarter', key: 'qtdListings', format: v => v + (v===1?' listing':' listings'), label: () => CONFIG.quarterLabel },
  { badge: '💰 QUARTER · GCI',      title: 'Deal Maker of the Quarter',        key: 'qtdGCI',      format: v => '$' + v.toLocaleString('en-NZ'),            label: () => CONFIG.quarterLabel },
  { badge: '🏠 ANNUAL · LISTINGS',  title: 'Lister of the Year',               key: 'ytdListings', format: v => v + (v===1?' listing':' listings'), label: () => CONFIG.financialYearLabel },
  { badge: '💰 ANNUAL · GCI',       title: 'Deal Maker of the Year',           key: 'ytdGCI',      format: v => '$' + v.toLocaleString('en-NZ'),            label: () => CONFIG.financialYearLabel },
];
const TABS = ['QTD Listings', 'QTD GCI', 'FY Listings', 'FY GCI'];
const FRAME_DURATION = 15000;

// ── STATE ────────────────────────────────────────────────────────
let current   = 0;
let frontIsActive = true; // which face is currently showing
let rotTimer  = null;
let progTimer = null;

// ── UTILITIES ───────────────────────────────────────────────────
function parseMoney(str) {
  if (str === null || str === undefined) return 0;
  return parseInt(String(str).replace(/[$,\s]/g, '')) || 0;
}
function initials(name) {
  return name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
}
function sortedBy(key) {
  return [...CONFIG.brokers].sort((a,b) => b[key] - a[key]);
}
function showStatus(msg, duration) {
  const el = document.getElementById('fetch-status');
  el.textContent = msg; el.style.opacity = '1';
  if (duration) setTimeout(() => el.style.opacity = '0', duration);
}

// ── COUNT-UP ANIMATION ──────────────────────────────────────────
function countUp(el, target, isMoney, isSuffix) {
  const duration = 1200;
  const start    = performance.now();
  const suffix   = isSuffix ? (target === 1 ? ' listing' : ' listings') : '';
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val  = Math.round(ease * target);
    el.textContent = isMoney ? '$' + val.toLocaleString('en-NZ') : val + suffix;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── BUILD FRAME HTML ─────────────────────────────────────────────
function buildFrame(fi) {
  const f       = FRAMES[fi];
  const brokers = sortedBy(f.key);
  const max     = brokers[0]?.[f.key] || 1;
  const top3    = brokers.slice(0, 3);
  const rest    = brokers.slice(3);
  // Podium order: 2, 1, 3
  const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
  const podiumClass = ['p2', 'p1', 'p3'];
  const podiumRank  = [2, 1, 3];
  const medals      = ['🥈', '🥇', '🥉'];

  const tabs = TABS.map((t,i) =>
    `<div class="tab ${i===fi?'active':''}" onclick="goTo(${i})">${t}</div>`
  ).join('');

  const podiumHTML = podiumOrder.map((b, pi) => {
    if (!b) return '';
    const pc   = podiumClass[pi];
    const rank = podiumRank[pi];
    const pct  = Math.round((b[f.key] / max) * 100);
    const avatarInner = b.photo
      ? `<img src="${b.photo}" alt="${b.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="avatar-initials" style="display:none">${initials(b.name)}</div>`
      : `<div class="avatar-initials">${initials(b.name)}</div>`;
    const isMoney  = f.key.toLowerCase().includes('gci');
    const isSuffix = f.key.toLowerCase().includes('listing');
    return `
      <div class="podium-card ${pc}">
        <div class="rank-crown">#${rank}</div>
        <div class="medal-icon">${medals[pi]}</div>
        <div class="avatar-ring">${avatarInner}</div>
        <div class="podium-name">${b.name}</div>
        <div class="podium-value" data-val="${b[f.key]}" data-money="${isMoney}" data-suffix="${isSuffix}">${f.format(b[f.key])}</div>
        <div class="podium-bar"><div class="podium-bar-fill" style="width:0%" data-pct="${pct}"></div></div>
      </div>`;
  }).join('');

  const restHTML = rest.map((b, ri) => {
    const rank = ri + 4;
    const pct  = Math.round((b[f.key] / max) * 100);
    const isMoney  = f.key.toLowerCase().includes('gci');
    const isSuffix = f.key.toLowerCase().includes('listing');
    const avatarInner = b.photo
      ? `<img src="${b.photo}" alt="${b.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div style="display:none">${initials(b.name)}</div>`
      : initials(b.name);
    return `
      <div class="rest-card">
        <div class="rest-rank">${rank}</div>
        <div class="rest-avatar">${avatarInner}</div>
        <div class="rest-info">
          <div class="rest-name">${b.name}</div>
          <div class="rest-value" data-val="${b[f.key]}" data-money="${isMoney}" data-suffix="${isSuffix}">${f.format(b[f.key])}</div>
          <div class="rest-bar"><div class="rest-bar-fill" style="width:0%" data-pct="${pct}"></div></div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="header">
      <div class="header-left">
        <img class="logo-img" src="2020KakapoBusiness_Sales_White.png" alt="Kakapo"
             onerror="this.outerHTML='<div class=\\'logo-box\\'>KAKAPO BUSINESS SALES</div>'">
        <div class="title-group">
          <div class="view-label">⚡ ${f.badge} · ${f.label()}</div>
          <div class="main-title"><span>${f.title}</span></div>
        </div>
      </div>
      <div class="header-center">
        <div class="period-badge">${CONFIG.quarterLabel} · <span>${CONFIG.financialYearLabel}</span></div>
      </div>
      <div class="header-right">
        <div class="live-dot">LIVE</div>
        <div class="clock" id="clk-${fi}">00:00:00</div>
        <div class="date"  id="dat-${fi}"></div>
      </div>
    </div>
    <div class="nav-tabs">${tabs}</div>
    <div class="podium">${podiumHTML}</div>
    <div class="rest-grid">${restHTML}</div>`;
}

// ── ANIMATE IN (bars + countup) ──────────────────────────────────
function animateIn(faceEl) {
  // Bars
  faceEl.querySelectorAll('[data-pct]').forEach(el => {
    const pct = el.dataset.pct;
    setTimeout(() => { el.style.transition = 'width 1.5s ease'; el.style.width = pct + '%'; }, 100);
  });
  // Count-up
  faceEl.querySelectorAll('[data-val]').forEach(el => {
    const val      = parseFloat(el.dataset.val);
    const isMoney  = el.dataset.money === 'true';
    const isSuffix = el.dataset.suffix === 'true';
    countUp(el, val, isMoney, isSuffix);
  });
}

// ── RENDER ───────────────────────────────────────────────────────
function render(fi) {
  if (CONFIG.brokers.length === 0) return;
  const html = buildFrame(fi);
  // Write to the hidden face
  const hiddenFace = frontIsActive
    ? document.getElementById('face-back')
    : document.getElementById('face-front');
  hiddenFace.innerHTML = html;
  updateClocks();

  const flipper = document.getElementById('flipper');

  // Flip
  if (frontIsActive) {
    flipper.classList.add('flipping');
  } else {
    flipper.classList.remove('flipping');
  }
  frontIsActive = !frontIsActive;

  // Animate in after flip starts
  setTimeout(() => animateIn(hiddenFace), 400);
}

function goTo(index) {
  clearTimeout(rotTimer);
  clearTimeout(progTimer);
  current = index;
  render(current);
  schedule();
}

function schedule() {
  rotTimer = setTimeout(() => {
    current = (current + 1) % FRAMES.length;
    render(current);
    schedule();
  }, FRAME_DURATION);
}

// ── CLOCKS ───────────────────────────────────────────────────────
function updateClocks() {
  const now = new Date();
  const t = now.toLocaleTimeString('en-NZ', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const d = now.toLocaleDateString('en-NZ', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  document.querySelectorAll('[id^="clk-"]').forEach(el => el.textContent = t);
  document.querySelectorAll('[id^="dat-"]').forEach(el => el.textContent = d);
}

// ── TICKER ───────────────────────────────────────────────────────
function buildTicker() {
  const sq = sortedBy('qtdGCI');
  const medalEmoji = ['🥇', '🥈', '🥉'];
  const items = sq.map((b, i) => {
    const emoji = i < 3 ? medalEmoji[i] : '⚡';
    return `<span>${emoji} ${b.name} · ${b.qtdListings} listings · $${b.qtdGCI.toLocaleString('en-NZ')} GCI this quarter</span>
     <span style="color:rgba(255,255,255,0.35);padding:0 16px">|</span>`;
  }).join('');
  document.getElementById('ticker').innerHTML = items + items;
}

// ── FETCH DATA ───────────────────────────────────────────────────
async function fetchSheetData() {
  showStatus('⟳ Refreshing data…');
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    CONFIG.brokers = rows.map(row => {
      const name = String(row['Name'] || '').trim();
      return {
        name,
        photo:       PHOTO_MAP[name.toLowerCase()] || null,
        qtdListings: parseInt(row['qtdListings']) || 0,
        ytdListings: parseInt(row['ytdListings']) || 0,
        qtdGCI:      parseMoney(row['qtdGCI']),
        ytdGCI:      parseMoney(row['ytdGCI']),
      };
    }).filter(b => b.name);

    buildTicker();

    // First load — render to front face directly without flip
    if (CONFIG.brokers.length > 0) {
      const frontFace = document.getElementById('face-front');
      frontFace.innerHTML = buildFrame(current);
      updateClocks();
      animateIn(frontFace);
      schedule();
    }
    showStatus('✅ Data updated', 3000);
  } catch (e) {
    showStatus(`⚠️ Fetch failed: ${e}`, 6000);
    console.error('Fetch failed:', e);
  }
}

// ── KEYBOARD ─────────────────────────────────────────────────────
let paused = false;
document.addEventListener('keydown', e => {
  if (e.code === 'Space')      { paused = !paused; if (paused) clearTimeout(rotTimer); else schedule(); }
  if (e.code === 'ArrowRight') goTo((current + 1) % FRAMES.length);
  if (e.code === 'ArrowLeft')  goTo((current + 3) % FRAMES.length);
});

// ── INIT ─────────────────────────────────────────────────────────
setInterval(updateClocks, 1000);
updateClocks();
fetchSheetData();
// Refresh data every 5 minutes
setInterval(fetchSheetData, 5 * 60 * 1000);
</script>
